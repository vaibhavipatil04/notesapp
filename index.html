<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        h1 {
            margin-top: 20px;
        }
        textarea {
            width: 80%;
            height: 100px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
        }
        .note {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 80%;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>📝 Notes App</h1>

    <textarea id="noteInput" placeholder="Write your note..."></textarea><br>
    <button onclick="addNote()">Add Note</button>

    <div id="notesContainer"></div>

    <script>
        function addNote() {
            let input = document.getElementById("noteInput");
            let noteText = input.value;

            if (noteText === "") {
                alert("Write something!");
                return;
            }

            let noteDiv = document.createElement("div");
            noteDiv.className = "note";
            noteDiv.innerHTML = noteText;

            document.getElementById("notesContainer").appendChild(noteDiv);

            input.value = "";
        }
    </script>

</body>
</html>
