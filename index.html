<!DOCTYPE html>
<html>
<head>
    <title>Notes App Pro</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: 0.3s;
        }

        .dark {
            background: #121212;
            color: white;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            transition: 0.3s;
        }

        .dark .container {
            background: #1e1e1e;
        }

        textarea, input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            cursor: pointer;
        }

        .note {
            background: #f1f1f1;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            text-align: left;
            position: relative;
        }

        .dark .note {
            background: #2c2c2c;
        }

        .delete {
            position: absolute;
            right: 10px;
            top: 5px;
            cursor: pointer;
            color: red;
        }

        .time {
            font-size: 12px;
            color: gray;
        }

        .toggle {
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📝 Notes App Pro</h2>

    <input id="search" placeholder="Search notes..." onkeyup="searchNotes()">
    <textarea id="noteInput" placeholder="Write your note..."></textarea>

    <button onclick="addNote()">Add Note</button>
    <button class="toggle" onclick="toggleDark()">🌙 Toggle Dark Mode</button>

    <div id="notesContainer"></div>
</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

function saveNotes() {
    localStorage.setItem("notes", JSON.stringify(notes));
}

function displayNotes() {
    let container = document.getElementById("notesContainer");
    container.innerHTML = "";

    notes.forEach((note, index) => {
        let div = document.createElement("div");
        div.className = "note";
        div.innerHTML = `
            ${note.text}
            <div class="time">${note.time}</div>
            <span class="delete" onclick="deleteNote(${index})">×</span>
        `;
        container.appendChild(div);
    });
}

function addNote() {
    let input = document.getElementById("noteInput");
    if (input.value === "") return;

    let newNote = {
        text: input.value,
        time: new Date().toLocaleString()
    };

    notes.push(newNote);
    saveNotes();
    displayNotes();

    input.value = "";
}

function deleteNote(index) {
    notes.splice(index, 1);
    saveNotes();
    displayNotes();
}

function toggleDark() {
    document.body.classList.toggle("dark");
}

function searchNotes() {
    let query = document.getElementById("search").value.toLowerCase();
    let filtered = notes.filter(n => n.text.toLowerCase().includes(query));

    let container = document.getElementById("notesContainer");
    container.innerHTML = "";

    filtered.forEach(note => {
        let div = document.createElement("div");
        div.className = "note";
        div.innerHTML = `
            ${note.text}
            <div class="time">${note.time}</div>
        `;
        container.appendChild(div);
    });
}

displayNotes();
</script>

</body>
</html>
